        window.selectedYear = new Date().getFullYear();

        // 1. Setup Dropdowns & Header
        function initBasicUI() {
            const m = document.getElementById("month-select");
            const y = document.getElementById("year-select");
            const daySel = document.getElementById("wfh-present-day");

            for(let i=1; i<=12; i++) {
                if(m && !m.querySelector(`[value="${i}"]`)) m.innerHTML += `<option value="${i}">เดือน ${i}</option>`;
            }
            if(y && y.options.length === 0) {
                for(let i=2024; i<=2030; i++) y.innerHTML += `<option value="${i}">${i}</option>`;
            }
            if(daySel && daySel.options.length === 0) {
                for(let i=1; i<=31; i++) daySel.innerHTML += `<option value="${i}">${i}</option>`;
            }

            if(m) m.value = window.selectedMonth;
            if(y) y.value = window.selectedYear;
            if(daySel) daySel.value = new Date().getDate();

            const thHTML = `
                <th class="px-4 py-3 text-center w-12 sticky left-0 bg-slate-950 z-20">ลำดับ</th>
                <th class="px-4 py-3 text-center w-16">ทีม</th>
                <th class="px-4 py-3 text-center w-20">ยศ</th>
                <th class="px-4 py-3 w-40">ชื่อพนักงาน</th>
                <th class="px-4 py-3 w-24">รหัส</th>
                <th class="px-4 py-3 w-24 text-center">ลักษณะงาน</th>
                <th class="px-4 py-3 w-20 text-center">กะ</th>
                <th class="px-4 py-3 w-28 text-center">เวลาเข้า</th>
                <th class="px-4 py-3 w-28 text-center">เวลาพัก</th>
                <th class="px-4 py-3 text-center w-14 bg-blue-950/20 text-blue-400">หยุด</th>
                <th class="px-4 py-3 text-center w-14 bg-amber-950/20 text-amber-400">ลา</th>
            `;
            const headerRow = document.getElementById("main-table-header");
            if (headerRow) {
                let html = thHTML;
                const daysOfWeek = ["อา", "จ", "อ", "พ", "พฤ", "ศ", "ส"];
                const today = new Date().getDate();
                for(let d=1; d<=31; d++) {
                    const dateObj = new Date(window.selectedYear, window.selectedMonth - 1, d);
                    const isWk = (dateObj.getDay() === 0 || dateObj.getDay() === 6);
                    let cls = isWk ? 'text-amber-400/80 bg-indigo-950/20' : '';
                    if (d === today) cls += ' bg-indigo-900/40 border-indigo-500 border-x-2';
                    html += `<th class="text-center p-0.5 border-l border-slate-800/60 min-w-[34px] ${cls}"><div class="text-[10px] font-normal py-0.5">${daysOfWeek[dateObj.getDay()]}</div><div class="text-[11px] font-bold py-0.5">${d}</div></th>`;
                }
                headerRow.innerHTML = html;
            }
        }

        // 2. Auth Logic
        window.loginUser = function() {
            const code = document.getElementById("login-code").value.trim().toUpperCase();
            if (!code) return;
            
            if (ADMIN_CODES.includes(code)) {
                window.currentUser = { code, name: "ADMIN", role: "ADMIN", rank: "S4", team: "ALL" };
            } else {
                const emp = window.currentStaffList.find(p => p.code === code);
                if (!emp) return document.getElementById("login-error").classList.remove("hidden");
                window.currentUser = { code, name: emp.name, role: "STAFF", rank: emp.rank, team: emp.team };
            }
            document.getElementById("login-modal").classList.add("hidden");
            document.getElementById("current-user-bar").classList.remove("hidden");
            document.getElementById("current-user-text").innerText = `👤 ${window.currentUser.name} | ${window.currentUser.team}`;
            
            initBasicUI();
            startCloudSync(); // trigger Firebase
        };

        window.logoutUser = function() {
            window.currentUser = null;
            document.getElementById("login-modal").classList.remove("hidden");
            document.getElementById("current-user-bar").classList.add("hidden");
        };

        // 3. Firebase Logic
        async function startCloudSync() {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                await signInAnonymously(auth);
                const docId = `schedule_${window.selectedYear}_${pad2(window.selectedMonth)}`;
                const ref = doc(db, "schedules", docId);
                
                onSnapshot(ref, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        if (data.staffList) window.currentStaffList = data.staffList;
                        if (data.attendanceChecks) window.attendanceChecks = data.attendanceChecks;
                        document.getElementById("sync-status").innerHTML = `<span class="px-2 py-1 bg-emerald-900/50 text-emerald-400 border border-emerald-500/50 rounded-lg text-xs font-semibold">● ออนไลน์: ซิงค์ล่าสุดแล้ว</span>`;
                        renderTable();
                        if (!document.getElementById("wfh-present-inline-panel").classList.contains("hidden")) {
                            window.generateWFHPresentToday();
                        }
                    } else {
                        // Create initial doc
                        setDoc(ref, { staffList: window.currentStaffList, attendanceChecks: {} });
                    }
                });
            } catch (e) {
                console.warn(e);
                document.getElementById("sync-status").innerHTML = `<span class="px-2 py-1 bg-rose-900/50 text-rose-400 border border-rose-500/50 rounded-lg text-xs font-semibold">● ออฟไลน์: ใช้ข้อมูลในเครื่อง</span>`;
                renderTable();
            }
        }

        window.commitData = async function() {
            if (!db) return;
            const docId = `schedule_${window.selectedYear}_${pad2(window.selectedMonth)}`;
            await setDoc(doc(db, "schedules", docId), {
                staffList: window.currentStaffList,
                attendanceChecks: window.attendanceChecks,
                updatedAt: serverTimestamp()
            }, { merge: true });
        };

        // 4. Main Render Logic
        window.renderTable = function() {
            const tbody = document.getElementById("staff-table-body");
            if (!tbody) return;

            const fTeam = document.getElementById("filter-team")?.value || "ALL";
            const q = document.getElementById("search-name")?.value.toLowerCase().trim();

            let html = '';
            let count = 0;

            window.currentStaffList.forEach(p => {
                if (window.currentUser?.team !== "ALL" && window.currentUser?.team !== p.team) return;
                if (fTeam !== "ALL" && p.team !== fTeam) return;
                if (q && !p.name.toLowerCase().includes(q) && !p.code.includes(q)) return;

                count++;
                const times = window.shiftTimes[p.shift] || { login: "-", rest: "-" };
                const tOffs = (p.offs || []).length;
                const tLeaves = (p.sl || []).length + (p.pl || []).length + (p.leaves || []).length;

                let rowHtml = `
                    <td class="py-2 px-2 text-center text-slate-500 sticky left-0 bg-slate-900 border-r border-slate-800 z-10">${count}</td>
                    <td class="py-2 px-1 text-center"><span class="px-2 py-0.5 text-[10px] font-bold border rounded bg-blue-500/10 text-blue-400">${p.team}</span></td>
                    <td class="py-2 px-1 text-center font-bold text-[10px] text-purple-400">${p.rank}</td>
                    <td class="py-2 px-3 font-bold">${p.name}</td>
                    <td class="py-2 px-3 text-slate-400 font-mono">${p.code}</td>
                    <td class="py-2 px-2 text-center text-[10px] text-emerald-400">${p.type}</td>
                    <td class="py-2 px-1 text-center font-bold">${p.shift}</td>
                    <td class="py-2 px-2 text-center text-slate-400 font-mono">${times.login}</td>
                    <td class="py-2 px-2 text-center text-slate-400 font-mono">${times.rest}</td>
                    <td class="py-2 px-2 text-center font-bold text-blue-400 bg-blue-950/10">${tOffs}/5</td>
                    <td class="py-2 px-2 text-center font-bold text-amber-500 bg-amber-950/10">${tLeaves}/1</td>
                `;

                for (let d = 1; d <= 31; d++) {
                    let bg = "bg-slate-900/10", txt = "•", color = "text-slate-600";
                    if (p.offs?.includes(d)) { bg = "bg-rose-950/30"; txt = "O"; color = "text-red-400 font-bold"; }
                    else if (p.sl?.includes(d)) { bg = "bg-amber-950/30"; txt = "SL"; color = "text-amber-400 font-bold"; }
                    else if (p.pl?.includes(d)) { bg = "bg-purple-950/30"; txt = "PL"; color = "text-purple-400 font-bold"; }
                    
                    if (txt === "•" && !times.login) bg = "blank-cell-alert";
                    
                    const editable = window.currentUser?.role === "ADMIN" || (window.currentUser?.rank === "S4" && window.currentUser?.team === p.team);
                    const click = editable ? `onclick="window.pendingDayToggle={id:${p.id}, d:${d}}; document.getElementById('day-confirm-modal').classList.remove('hidden');"` : "";
                    
                    rowHtml += `<td ${click} class="text-center p-0.5 border-l border-slate-800/40 text-[11px] ${bg} ${editable?'cursor-pointer':''}"><div class="w-7 h-7 flex items-center justify-center mx-auto rounded-md ${color}">${txt}</div></td>`;
                }
                
                html += `<tr class="hover:bg-slate-800/40 border-b border-slate-800">${rowHtml}</tr>`;
            });

            tbody.innerHTML = html;
        };

        // 5. Day Toggle (Quota System)
        window.confirmToggleDayOff = async function() {
            if (!window.pendingDayToggle) return;
            const { id, d } = window.pendingDayToggle;
            const status = document.getElementById("day-confirm-status").value;
            const p = window.currentStaffList.find(x => x.id === id);

            p.offs = (p.offs||[]).filter(x => x !== d);
            p.sl = (p.sl||[]).filter(x => x !== d);
            p.pl = (p.pl||[]).filter(x => x !== d);

            if (status === "O") p.offs.push(d);
            if (status === "SL") p.sl.push(d);
            if (status === "PL") p.pl.push(d);

            document.getElementById("day-confirm-modal").classList.add("hidden");
            await window.commitData();
        };

        // 6. 🟢 WFH Present System (Perfect 13 Columns & No Loop)
        window.generateWFHPresentToday = function() {
            const day = Number(document.getElementById("wfh-present-day")?.value || new Date().getDate());
            const month = Number(document.getElementById("month-select")?.value || window.selectedMonth);
            const year = Number(document.getElementById("year-select")?.value || window.selectedYear);

            document.getElementById("wfh-present-inline-panel").classList.remove("hidden");
            document.getElementById("wfh-present-inline-date").innerText = `ประจำวันที่ : ${day}/${month}/${year}`;

            const checkKey = `${year}_${pad2(month)}_${pad2(day)}`;
            const wfhStaff = window.currentStaffList.filter(p => p.type === "WFH");

            const tbody = document.getElementById("wfh-present-table-body");
            let html = '';
            let count = 0;

            wfhStaff.forEach((p) => {
                if (window.currentUser?.team !== "ALL" && window.currentUser?.team !== p.team) return;
                
                const rec = window.attendanceChecks?.[checkKey]?.[p.id] || { leave: false, checked: false, checker: "-", time: "-" };
                const isLeave = rec.leave || p.offs?.includes(day) || p.sl?.includes(day) || p.pl?.includes(day);
                const isChecked = rec.checked && !isLeave;
                
                count++;
                const times = window.shiftTimes[p.shift] || { login: "-", rest: "-" };
                
                const statusHtml = isLeave 
                    ? `<span class="px-2 py-1 rounded bg-purple-500/20 text-purple-300 font-bold text-xs">ลา</span>` 
                    : isChecked 
                        ? `<span class="px-2 py-1 rounded bg-emerald-500/20 text-emerald-400 font-bold text-xs">มาทำงาน</span>` 
                        : `<span class="px-2 py-1 rounded bg-slate-500/20 text-slate-300 font-bold text-xs">รอตรวจ</span>`;

                html += `
                    <tr class="hover:bg-slate-800/40 border-b border-slate-800">
                        <td class="px-4 py-3 text-slate-400">${count}</td>
                        <td class="px-4 py-3"><span class="px-2 py-1 rounded text-xs font-bold bg-blue-500/10 text-blue-400">${p.team}</span></td>
                        <td class="px-4 py-3"><span class="px-2 py-1 rounded text-xs font-bold text-purple-400">${p.rank}</span></td>
                        <td class="px-4 py-3 font-mono text-slate-400">${p.code}</td>
                        <td class="px-4 py-3 font-bold text-slate-100">${p.name}</td>
                        <td class="px-4 py-3 text-xs font-bold text-indigo-300">${p.shift}</td>
                        <td class="px-4 py-3 text-slate-300">${times.login}</td>
                        <td class="px-4 py-3 text-slate-300">${times.rest}</td>
                        <td class="px-4 py-3 text-center">${statusHtml}</td>
                        <td class="px-4 py-3 text-center">
                            <input type="checkbox" ${isLeave ? "checked" : ""} onchange="setWFHAttendance('${p.id}', ${day}, 'leave', this.checked)" class="w-4 h-4 accent-purple-500 cursor-pointer">
                        </td>
                        <td class="px-4 py-3 text-center">
                            <input type="checkbox" ${isChecked ? "checked" : ""} onchange="setWFHAttendance('${p.id}', ${day}, 'check', this.checked)" class="w-4 h-4 accent-emerald-500 cursor-pointer">
                        </td>
                        <td class="px-4 py-3 text-center text-slate-300">${rec.checker || "-"}</td>
                        <td class="px-4 py-3 text-center text-slate-300">${rec.time || "-"}</td>
                    </tr>
                `;
            });

            tbody.innerHTML = count > 0 ? html : `<tr><td colspan="13" class="px-4 py-8 text-center text-slate-500">ไม่พบพนักงาน</td></tr>`;
        };

        window.setWFHAttendance = async function(id, day, mode, checked) {
            if (!window.currentUser) return alert("กรุณาเข้าสู่ระบบก่อน");
            const month = Number(document.getElementById("month-select")?.value || window.selectedMonth);
            const year = Number(document.getElementById("year-select")?.value || window.selectedYear);
            const checkKey = `${year}_${pad2(month)}_${pad2(day)}`;
            
            if (!window.attendanceChecks) window.attendanceChecks = {};
            if (!window.attendanceChecks[checkKey]) window.attendanceChecks[checkKey] = {};
            
            const rec = window.attendanceChecks[checkKey][id] || { leave: false, checked: false, checker: "-", time: "-" };
            
            if (mode === "leave") {
                rec.leave = checked;
                if (checked) { rec.checked = false; rec.checker = "-"; rec.time = "-"; }
            } else if (mode === "check") {
                rec.checked = checked;
                if (checked) { 
                    rec.leave = false; 
                    rec.checker = window.currentUser.name || "ADMIN";
                    const now = new Date();
                    rec.time = `${pad2(now.getHours())}:${pad2(now.getMinutes())}`;
                } else {
                    rec.checker = "-"; rec.time = "-";
                }
            }
            
            window.attendanceChecks[checkKey][id] = rec;
            window.generateWFHPresentToday(); // Re-render directly (No Observer Loop)
            await window.commitData();
        };

    </script>
</body>
</html>
